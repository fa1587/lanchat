name: lanchat
description: 局域网文件传输 + 即时消息应用
publish_to: 'none'
version: 1.6.0+21

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.1

  # 网络
  http: ^1.2.0
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  shelf_web_socket: ^2.0.0
  web_socket_channel: ^2.4.0
  multicast_dns: ^0.3.2

  # 文件 & 存储
  file_picker: ^8.3.7
  # desktop_drop: ^0.5.0  # 桌面端拖拽，Android 不支持，暂时移除
  shared_preferences: ^2.2.3
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.3
  sqlite3: ^2.4.5
  path_provider: ^2.1.3
  open_filex: ^4.4.0

  # 权限 & 网络信息
  permission_handler: ^11.3.1
  network_info_plus: ^6.0.1
  package_info_plus: ^8.0.0

  # 工具
  uuid: ^4.4.0
  crypto: ^3.0.3
  mime: ^1.0.5
  intl: ^0.20.2
  image: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/
